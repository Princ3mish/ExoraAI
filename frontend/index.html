<!doctype html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <!-- Favicons — using the real Exora logo -->
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="apple-touch-icon" href="/logo.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <!-- Viewport -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- SEO -->
    <meta name="description" content="Exora AI — Your AI-Powered Meeting Assistant. Schedule, confirm, and prepare meetings automatically via Telegram, voice calls, and email." />
    <meta name="theme-color" content="#6366F1" />
    <!-- Open Graph -->
    <meta property="og:title" content="Exora AI" />
    <meta property="og:description" content="Your AI-Powered Meeting Assistant" />
    <meta property="og:type" content="website" />
    <title>Exora AI — Your AI-Powered Meeting Assistant</title>
    <!-- Apply theme before React hydrates to prevent flash -->
    <script>
      (function () {
        var t = localStorage.getItem('theme');
        var root = document.documentElement;
        if (t === 'dark') {
          root.classList.add('dark');
          root.classList.remove('light');
        } else {
          root.classList.remove('dark');
          root.classList.add('light');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
